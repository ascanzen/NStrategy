services:
  n-pattern-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    container_name: seawealthy-n-pattern
    restart: unless-stopped
    environment:
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    command:
      - python
      - get_most_cross_section_data.py
      - --daemon
      - --market
      - all
      - --interval-minutes
      - "15"

  n-pattern-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    container_name: seawealthy-n-pattern-api
    restart: unless-stopped
    environment:
      N_PATTERN_DIR: ${N_PATTERN_DIR:-/app/outputs/n_pattern}
      STOCK_ALIAS_FILE: ${STOCK_ALIAS_FILE:-/app/data/stock_aliases.csv}
    volumes:
      - ./outputs:/app/outputs:ro
      - ./data:/app/data:ro
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  n-pattern-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: seawealthy-n-pattern-web
    restart: unless-stopped
    depends_on:
      - n-pattern-api
    ports:
      - "${WEB_BIND:-0.0.0.0}:${WEB_HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
